# Redmine configuration file
# For details, see config/configuration.yml.example

production:
  <% if ENV['SMTP_ADDRESS'] && !ENV['SMTP_ADDRESS'].empty? %>
  email_delivery:
    delivery_method: :smtp
    smtp_settings:
      address: <%= ENV['SMTP_ADDRESS'].inspect %>
      port: <%= ENV['SMTP_PORT'] || 587 %>
      domain: <%= ENV['SMTP_DOMAIN'].inspect %>
      authentication: <%= (ENV['SMTP_AUTHENTICATION'] || 'plain').to_sym.inspect %>
      user_name: <%= ENV['SMTP_USER_NAME'].inspect %>
      password: <%= ENV['SMTP_PASSWORD'].inspect %>
      enable_starttls_auto: <%= ENV['SMTP_ENABLE_STARTTLS_AUTO'].nil? ? true : (ENV['SMTP_ENABLE_STARTTLS_AUTO'] == 'true') %>
  <% end %>
